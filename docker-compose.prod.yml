services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DRIFT_ENV: ${DRIFT_ENV:-production}
      DRIFT_ALLOWED_HOSTS: ${DRIFT_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,testserver}
      DRIFT_CORS_ORIGINS: ${DRIFT_CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      DRIFT_MAX_PAYLOAD_BYTES: ${DRIFT_MAX_PAYLOAD_BYTES:-10485760}
      DRIFT_GZIP_MINIMUM_SIZE: ${DRIFT_GZIP_MINIMUM_SIZE:-1024}
      DRIFT_ENABLE_HSTS: ${DRIFT_ENABLE_HSTS:-true}
      DRIFT_PORT: ${DRIFT_PORT:-8000}
    restart: unless-stopped
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - backend
